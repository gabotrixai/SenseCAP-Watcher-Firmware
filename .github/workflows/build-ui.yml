name: Build Watcher UI
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.2.1
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Create missing image stubs
        shell: bash
        run: |
          # The firmware references image assets that may not exist in the repo
          # Create stub declarations so the build succeeds
          cat > examples/factory_firmware/main/view/ui_img_stubs.c << 'STUBS'
          #include "lvgl.h"
          // Stub image descriptors for missing assets
          const lv_img_dsc_t ui_img_speaking1_png = { .header.w = 0, .header.h = 0, .data_size = 0, .data = NULL };
          const lv_img_dsc_t ui_img_speaking2_png = { .header.w = 0, .header.h = 0, .data_size = 0, .data = NULL };
          STUBS

      - name: Build firmware
        shell: bash
        run: |
          . /opt/esp/idf/export.sh
          cd examples/factory_firmware
          # Disable -Werror to handle warnings in upstream code
          export EXTRA_CFLAGS="-Wno-error"
          export EXTRA_CXXFLAGS="-Wno-error"
          idf.py set-target esp32s3
          idf.py build

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            examples/factory_firmware/build/factory_firmware.bin
            examples/factory_firmware/build/bootloader/bootloader.bin
            examples/factory_firmware/build/partition_table/partition-table.bin
          retention-days: 7
