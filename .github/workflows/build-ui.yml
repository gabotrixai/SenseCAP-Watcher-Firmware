name: Build Watcher UI
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.2.1
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Patch missing image stubs
        shell: bash
        run: |
          cd examples/factory_firmware
          # Add extern declarations to app_png.c so the symbols are in scope
          sed -i '1i extern const lv_img_dsc_t ui_img_speaking1_png;
extern const lv_img_dsc_t ui_img_speaking2_png;' main/app/app_png.c
          # Create a stub .c that defines the actual symbols
          printf '#include "lvgl.h"
const lv_img_dsc_t ui_img_speaking1_png = { .header.w = 0, .header.h = 0, .data_size = 0, .data = NULL };
const lv_img_dsc_t ui_img_speaking2_png = { .header.w = 0, .header.h = 0, .data_size = 0, .data = NULL };
' > main/app/ui_img_stubs.c
          # Register the stub file in CMakeLists so it gets compiled
          sed -i 's|"main/app/app_png.c"|"main/app/app_png.c" "main/app/ui_img_stubs.c"|' main/CMakeLists.txt
          # Fallback: if exact match failed, try appending via idf_component_register SRCS
          if ! grep -q 'ui_img_stubs.c' main/CMakeLists.txt; then
            sed -i '/SRCS/s|)|"main/app/ui_img_stubs.c")|' main/CMakeLists.txt
          fi

      - name: Build firmware
        shell: bash
        run: |
          . /opt/esp/idf/export.sh
          cd examples/factory_firmware
          export EXTRA_CFLAGS="-Wno-error"
          export EXTRA_CXXFLAGS="-Wno-error"
          idf.py set-target esp32s3
          idf.py build

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            examples/factory_firmware/build/factory_firmware.bin
            examples/factory_firmware/build/bootloader/bootloader.bin
            examples/factory_firmware/build/partition_table/partition-table.bin
          retention-days: 7
