name: Build Watcher UI
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.2.1
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build firmware
        shell: bash
        run: |
          . /opt/esp/idf/export.sh
          cd examples/factory_firmware
          idf.py set-target esp32s3
          idf.py build

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            examples/factory_firmware/build/factory_firmware.bin
            examples/factory_firmware/build/bootloader/bootloader.bin
            examples/factory_firmware/build/partition_table/partition-table.bin
          retention-days: 7
